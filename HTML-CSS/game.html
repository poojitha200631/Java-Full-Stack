<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lamp Game</title>
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: Arial, sans-serif;
			background: #111;
			color: #fff;
		}

		.card {
			text-align: center;
			padding: 30px 40px;
			border-radius: 20px;
			background: #1c1c1c;
			box-shadow: 0 0 25px rgba(0, 0, 0, 0.35);
		}

		.lamp {
			width: 120px;
			height: 120px;
			margin: 0 auto 20px;
			border-radius: 50%;
			background: radial-gradient(circle at 35% 30%, #666, #2f2f2f 72%);
			border: 5px solid rgba(255, 255, 255, 0.22);
			outline: 8px solid rgba(255, 255, 255, 0.05);
			box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.12);
			transition: 0.3s ease;
		}

		.lamp.on {
			background: radial-gradient(circle at 35% 30%, #fff5b0, #ffd54a 70%);
			box-shadow: 0 0 34px 12px rgba(255, 213, 74, 0.5), inset 0 0 18px rgba(255, 255, 255, 0.35);
		}

		button {
			padding: 10px 18px;
			border: 0;
			border-radius: 8px;
			cursor: pointer;
			font-size: 16px;
		}
	</style>
</head>
<body>
	<div class="card">
		<div id="lamp" class="lamp"></div>
		<button onclick="toggleLamp()">Toggle Light</button>
	</div>

	<script>
		function toggleLamp() {
			document.getElementById("lamp").classList.toggle("on");
		}
	</script>
</body>
</html>
