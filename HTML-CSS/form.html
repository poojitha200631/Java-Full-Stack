<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form>
        <p>
            Name: <input type="text" placeholder="Harish"><br>
            Age: <input type="number" placeholder="19"><br>
            Email: <input type="email" placeholder="123@gmail.com"><br>
            Gender:
            <input type="radio" name="gender" id="1">Male
            <input type="radio" name="gender" id="2">Female
            <input type="radio" name="gender" id="3">Dont want to Mention
            <br>
            Qualifications:
            <input type="checkbox" name="qualification">10 <sup>th</sup>
            <input type="checkbox" name="qualification">12 <sup>th</sup>
            <input type="checkbox" name="qualification">Diploma
            <input type="checkbox" name="qualification">Degree
            <input type="checkbox" name="qualification">Masters
            <input type="checkbox" name="qualification">PhD
            <br>
            Password :
            <input type="password" id="password" placeholder="fjfKjytdFLUKG^5446754">
            <button type="button" onclick="togglePassword()">👁</button>
            <br>
            Date: <input type="date"><br>
            Time: <input type="datetime-local">
            <br>
            Files: <input type="file">
            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
        </p>
    </form>
    <header>hello</header>
    <div id="div1">hi</div>
    <div id="div2">Hey</div>
    <div class="CSE">C++</div>
    <label for="Name">Java</label>
    <footer>6</footer>
    <script>
        function togglePassword() {
            let password = document.getElementById("password");
            if (password.type === "password") {
                password.type = "text";
            } else {
                password.type = "password";
            }
        }
    </script>
</body>
</html>
